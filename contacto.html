<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contáctanos | Grano Vivo Selecto</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/contacto.css" />
    <link rel="stylesheet" href="./css/HeaderFooter.css">
    <link rel="stylesheet" href="./css/loader.css">
</head>

<body>
    <div id="site-loader" aria-hidden="true">
        <div class="loader-content">
            <img src="./img/Imagen de WhatsApp 2025-10-06 a las 15.36.05_49e00a52.jpg" alt="logo" class="loader-logo">
            <div class="spinner" role="status" aria-label="Cargando"></div>
        </div>
    </div>
    <div id="header"></div>

    <div class="contactanos">
        <h1>Contáctanos</h1>
        <p class="lead">
            Estamos aquí para ayudarte. Completa el formulario a continuación y nos
            pondremos en contacto contigo lo antes posible.
        </p>
    </div>

    <!-- ======== FORMULARIO ======== -->
    <div class="container mt-5" style="max-width: 650px">
        <div class="card shadow p-4">
            <form id="form-contacto">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required />
                    </div>
                    <div class="col-md-6">
                        <label for="apellido" class="form-label">Apellido</label>
                        <input type="text" class="form-control" id="apellido" name="apellido" required />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="correo" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="correo" name="correo" required />
                </div>
                <div class="mb-3">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input type="tel" class="form-control" id="telefono" name="telefono" required />
                </div>
                <div class="mb-3">
                    <label for="mensaje" class="form-label">Mensaje</label>
                    <textarea class="form-control" id="mensaje" name="mensaje" rows="4" required></textarea>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-4">Enviar</button>
                </div>
            </form>
            <div id="alerta" class="alert alert-success mt-3 text-center d-none">
                ¡Gracias por contactarnos! Te responderemos pronto.
            </div>
        </div>
    </div>

    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3900.867779336594!2d-77.04449502504655!3d-12.06632124222943!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105c8b2cdfc2c6b%3A0xe83d849f7f82fcf1!2sAv.%20Gral.%20Juan%20Antonio%20%C3%81lvarez%20de%20Arenales%201199%2C%20Lima%2015001!5e0!3m2!1ses-419!2spe!4v1700000000000!5m2!1ses-419!2spe"
        width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>

    <!-- ======== FOOTER ======== -->
    <div id="footer"></div>

    <!-- ======== SCRIPTS ======== -->
    <script src="./js/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/alerta.js"></script>
    <script src="js/HFer.js"></script>
</body>

</html>
