<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tienda | Grano Vivo Selecto</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/estilos.css">
  <link rel="stylesheet" href="./css/HeaderFooter.css">
  <link rel="stylesheet" href="./css/loader.css">
</head>

<body>

  <div id="site-loader" aria-hidden="true">
    <div class="loader-content">
      <img src="./img/Imagen de WhatsApp 2025-10-06 a las 15.36.05_49e00a52.jpg" alt="logo" class="loader-logo">
      <div class="spinner" role="status" aria-label="Cargando"></div>
    </div>
  </div>

  <!-- Barra de navegación -->

  <div id="header"></div>

  <!-- Contenedor principal -->
  <main class="container my-5">
    <div class="row">
      <!-- Filtros -->
      <aside class="col-md-3">
        <h5 class="fw-bold mb-4">Categoría</h5>
        <hr>
        <p><a href="#" class="text-decoration-none text-dark">Línea</a></p>
        <hr>
        <p><a href="#" class="text-decoration-none text-dark">Perfil de calidad</a></p>
        <hr>
        <p><a href="#" class="text-decoration-none text-dark">Origen</a></p>
        <hr>
        <p><a href="#" class="text-decoration-none text-dark">Peso</a></p>
      </aside>

      <!-- Productos -->
      <section class="col-md-9">
        <div class="row g-4">
          <!-- Producto 1 -->
          <div class="col-md-4">
            <div class="card product-card">
              <div class="position-relative">
                <img src="./img/cafe01.png" class="card-img-top" alt="Café Tradición">
              </div>
              <div class="card-body text-center">
                <h6 class="text-success fw-bold">CAFÉ TRADICIÓN - PACK X3</h6>
                <p class="text-decoration-line-through text-muted">S/90</p>
                <p class="fs-5 fw-bold">S/80</p>
                <button class="btn btn-success w-100">AÑADIR AL CARRITO</button>
              </div>
            </div>
          </div>

          <!-- Producto 2 -->
          <div class="col-md-4">
            <div class="card product-card">
              <div class="position-relative">
                <img src="./img/cafe02.png" class="card-img-top" alt="Café Orgánico">
              </div>
              <div class="card-body text-center">
                <h6 class="text-success fw-bold">CAFÉ ORGÁNICO - PACK X3</h6>
                <p class="text-decoration-line-through text-muted">S/105</p>
                <p class="fs-5 fw-bold">S/90</p>
                <button class="btn btn-success w-100">SELECCIONAR OPCIÓN</button>
              </div>
            </div>
          </div>

          <!-- Producto 3 -->
          <div class="col-md-4">
            <div class="card product-card">
              <div class="position-relative">
                <img src="./img/cafe03.png" class="card-img-top" alt="Café Premium">
              </div>
              <div class="card-body text-center">
                <h6 class="text-success fw-bold">CAFÉ PREMIUM - PACK X3</h6>
                <p class="text-decoration-line-through text-muted">S/135</p>
                <p class="fs-5 fw-bold">S/115</p>
                <button class="btn btn-success w-100">SELECCIONAR OPCIÓN</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <!-- ===== FOOTER ===== -->
  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/loader.js"></script>
  <script src="js/HFer.js"></script>
</html>
